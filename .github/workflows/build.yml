name: bake
on:
  push: {}
  workflow_dispatch: {}

jobs:
  bake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (big CUDA base image)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker system prune -af || true
          df -h / | tail -1

      - name: Build (bakes weights into the image)
        run: |
          IMG=ghcr.io/${{ github.repository_owner }}/birefnet:latest
          echo "IMG=$IMG" >> $GITHUB_ENV
          docker build -t "$IMG" .

      - name: Prove ZERO-download cold start (run with NO network, weights from baked layer)
        run: |
          # --network none => the container literally cannot reach the internet. If the model loads,
          # the weights are in the image (baked), which is the whole point of #2.
          docker run --rm --network none "$IMG" python -c "
          from transformers import AutoModelForImageSegmentation as M
          m = M.from_pretrained('ZhengPeng7/BiRefNet', trust_remote_code=True)
          print('LOADED FROM BAKED WEIGHTS WITH NO NETWORK -> zero-download cold start OK')
          "

      - name: Functional check (server serves a mask)
        run: |
          docker run -d --name s -p 8000:8000 "$IMG"
          for i in $(seq 1 40); do
            curl -sf localhost:8000/health | grep -q '"model_loaded":true' && break || sleep 3
          done
          curl -s localhost:8000/health; echo
          python3 - <<'PY'
          import requests, base64, io
          from PIL import Image
          im = Image.new("RGB", (128, 128), "white")
          buf = io.BytesIO(); im.save(buf, "PNG")
          b = base64.b64encode(buf.getvalue()).decode()
          r = requests.post("http://localhost:8000/infer", json={"image": b}, timeout=180)
          print("infer", r.status_code, "keys", list(r.json().keys()))
          assert r.status_code == 200, "infer failed"
          PY

      - name: Login + push to ghcr
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push "$IMG"
          echo "PUSHED $IMG"
